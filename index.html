<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Info — info.kofis.eu</title>
<link rel="stylesheet" href="./shared.css">
<style>
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px;
}
h1 {
  font-size: 2em;
  font-weight: 300;
  color: #7f8fa6;
  margin-bottom: 4px;
}
h1 span { color: #e0e0e0; font-weight: 600; }
.subtitle {
  color: #555;
  font-size: 14px;
  margin-bottom: 24px;
}
.search-box {
  width: 100%;
  padding: 12px 16px;
  background: #16213e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  margin-bottom: 24px;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: #4a6fa5; }
.search-box::placeholder { color: #555; }
.count {
  font-size: 12px;
  color: #555;
  margin-bottom: 12px;
}
.articles {
  display: grid;
  gap: 12px;
}
a.article {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: #16213e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  color: #e0e0e0;
  text-decoration: none;
  transition: all 0.15s;
}
a.article:hover {
  border-color: #4a6fa5;
  background: #1a2744;
  transform: translateX(4px);
}
.article-icon {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -0.5px;
}
.icon-CBZ { background: #4a4a2a; color: #e6e282; }
.icon-SRV { background: #2a4a3a; color: #82e6a0; }
.icon-AI  { background: #3a2a4a; color: #d4a0e6; }
.icon-HW  { background: #2a3a4a; color: #82c4e6; }
.icon-default { background: #4a2a3a; color: #e6a0c4; }
.article-info { flex: 1; }
.article-title {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 2px;
}
.article-desc {
  font-size: 13px;
  color: #7f8fa6;
}
.article-meta {
  font-size: 11px;
  color: #444;
  margin-top: 3px;
}
.article-arrow {
  color: #3a3a5a;
  font-size: 20px;
  transition: color 0.15s;
}
a.article:hover .article-arrow { color: #4a6fa5; }
.no-results {
  text-align: center;
  color: #555;
  padding: 40px 0;
  display: none;
}
@media (max-width: 500px) {
  .container { padding: 20px 12px; }
  a.article { padding: 14px 16px; }
}
</style>
</head>
<body>
<nav class="site-nav"><span class="current">info.kofis.eu</span></nav>
<div class="container">
  <h1><span>Info</span></h1>
  <div class="subtitle">Clanky a dokumentace</div>

  <input type="text" class="search-box" id="search" placeholder="Hledat..." autofocus>
  <div class="count" id="count"></div>

  <div class="articles" id="articles"></div>
  <div class="no-results" id="no-results">Nic nenalezeno</div>

<nav class="site-footer">
<a href="./">info.kofis.eu</a>
</nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
const DATA = [
  {
    title: "VSCode / VSCodium — IntelliJ IDEA theme",
    desc: "JetBrains Mono font + IntelliJ Islands theme, instalacni skript pro VSCode i VSCodium na macOS",
    tags: "vscode vscodium intellij idea theme jetbrains mono font dark codium ide editor",
    url: "vscode-intellij-theme/",
    icon: "HW",
    meta: "JetBrains Mono + Islands Dark | macOS",
    created: "2026-03-31"
  }
];

DATA.sort((a, b) => (b.created || '').localeCompare(a.created || ''));

const container = document.getElementById('articles');
const countEl = document.getElementById('count');
const noResults = document.getElementById('no-results');
const searchInput = document.getElementById('search');

const fuse = new Fuse(DATA, {
  keys: [
    { name: 'title', weight: 3 },
    { name: 'desc', weight: 2 },
    { name: 'tags', weight: 1 },
    { name: 'meta', weight: 1 }
  ],
  threshold: 0.4,
  ignoreLocation: true
});

function render(items) {
  container.innerHTML = items.map(d => `
    <a href="${d.url}" class="article">
      <div class="article-icon icon-${d.icon} icon-default">${d.icon}</div>
      <div class="article-info">
        <div class="article-title">${d.title}</div>
        <div class="article-desc">${d.desc}</div>
        <div class="article-meta">${d.meta}${d.created ? ' | ' + d.created : ''}</div>
      </div>
      <div class="article-arrow">&rsaquo;</div>
    </a>
  `).join('');
  countEl.textContent = items.length + ' ' + (items.length === 1 ? 'clanek' : items.length < 5 ? 'clanky' : 'clanku');
  noResults.style.display = items.length === 0 ? 'block' : 'none';
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { render(DATA); return; }
  render(fuse.search(q).map(r => r.item));
});

render(DATA);

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
</body>
</html>
